<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EN PIN CH — Acceso Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-bg">
    <div class="login-particles" id="particles"></div>
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-char">龍</span>
        <div class="logo-text">
          <span class="logo-name">EN PIN CH</span>
          <span class="logo-sub">Panel Administrativo</span>
        </div>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="admin@enpinch.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="login-error" id="loginError"></div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span id="btnText">Ingresar</span>
          <span id="btnLoader" class="btn-loader hidden"></span>
        </button>
      </form>

      <p class="login-footer">EN PIN CH &copy; <span id="yr"></span></p>
    </div>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Error al iniciar sesión';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '/admin.html';
      } catch {
        errorEl.textContent = 'No se pudo conectar con el servidor';
      } finally {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    // Si ya hay sesión, redirigir
    if (localStorage.getItem('token')) {
      window.location.href = '/admin.html';
    }
  </script>
</body>
</html>
